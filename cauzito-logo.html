<script>
  (function () {
    var BASE = 'Assets/Cauzito%C2%B4s%20Live%20Stream%20Logo/';
    var IMAGES = [
      BASE + 'vinicius-pim-logo-cau.jpg',
      BASE + 'vinicius-pim-logo-cau-2.jpg',
      BASE + 'vinicius-pim-logo-cau-2-prancheta-1.jpg',
      BASE + 'vinicius-pim-logo-cau-4-prancheta-1.jpg',
      BASE + 'vinicius-pim-logo-cau-5-prancheta-1.jpg',
      BASE + 'vinicius-pim-logo-cau-6-prancheta-1.jpg',
      BASE + 'vinicius-pim-logo-cau-7-prancheta-1.jpg',
      BASE + 'vinicius-pim-logo-cau-8-prancheta-1.jpg',
      BASE + 'vinicius-pim-logo-cau-9-prancheta-1.jpg',
      BASE + 'vinicius-pim-logo-cau-10-prancheta-1.jpg',
      BASE + 'vinicius-pim-logo-cau-11-prancheta-1.jpg',
      BASE + 'vinicius-pim-logo-cau-12-prancheta-1-prancheta-1.jpg'
    ];

    var currentIndex = 0;
    var lightbox    = document.getElementById('cauzitoLightbox');
    var lightboxImg = document.getElementById('cauzitoLightboxImg');

    function navigate(index) {
      currentIndex = ((index % IMAGES.length) + IMAGES.length) % IMAGES.length;
      lightboxImg.src = IMAGES[currentIndex];
    }

    function openLightbox(index) {
      navigate(index);
      lightbox.classList.add('cauzito-lightbox--open');
      document.body.classList.add('no-scroll');
    }

    function closeLightbox() {
      lightbox.classList.remove('cauzito-lightbox--open');
      document.body.classList.remove('no-scroll');
    }

    document.querySelectorAll('.cauzito-thumb-wrapper').forEach(function (el) {
      el.addEventListener('click', function () {
        openLightbox(parseInt(el.getAttribute('data-index'), 10));
      });
    });

    document.getElementById('cauzitoClose').addEventListener('click', closeLightbox);

    document.getElementById('cauzitoPrev').addEventListener('click', function (e) {
      e.stopPropagation();
      navigate(currentIndex - 1);
    });

    document.getElementById('cauzitoNext').addEventListener('click', function (e) {
      e.stopPropagation();
      navigate(currentIndex + 1);
    });

    lightbox.addEventListener('click', function (e) {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', function (e) {
      if (!lightbox.classList.contains('cauzito-lightbox--open')) return;
      if (e.key === 'Escape')      closeLightbox();
      else if (e.key === 'ArrowLeft')  navigate(currentIndex - 1);
      else if (e.key === 'ArrowRight') navigate(currentIndex + 1);
    });
  })();
</script>
